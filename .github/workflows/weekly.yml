name: Weekly Paper Commercial Radar

on:
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-weekly-radar:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Generate weekly outputs
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          SEMANTIC_SCHOLAR_API_KEY: ${{ secrets.SEMANTIC_SCHOLAR_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -n "$OPENAI_API_KEY" ]; then
            python main.py --days-back 7 --final-count 21
          else
            python main.py --days-back 7 --final-count 21 --no-llm
          fi

      - name: Commit changed outputs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f outputs/*.json outputs/*.csv outputs/*.md
          if git diff --cached --quiet; then
            echo "No output changes"
            exit 0
          fi
          git commit -m "chore: update weekly paper radar"
          git push

