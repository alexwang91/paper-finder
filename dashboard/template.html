<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Paper Finder · 商业机会 Top 21</title>
  <style>
    :root{--bg:#f7f7f5;--panel:#fff;--ink:#171717;--muted:#73736d;--line:#deded8;--blue:#2563eb;--lime:#dfff4f;--soft:#f0f0ec;--radius:14px}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--ink);font:14px/1.55 Inter,ui-sans-serif,system-ui,-apple-system,"Segoe UI",sans-serif}button,input,select{font:inherit}.shell{max-width:1440px;margin:auto;padding:26px}.top{display:flex;align-items:flex-end;justify-content:space-between;gap:20px;margin-bottom:20px}.eyebrow{font:700 11px/1.2 ui-monospace,monospace;letter-spacing:.14em;color:var(--blue);text-transform:uppercase}.top h1{font-size:clamp(26px,4vw,48px);line-height:1.05;letter-spacing:-.04em;margin:7px 0}.sub{color:var(--muted)}.badge{background:var(--lime);border:1px solid #c8e540;border-radius:999px;padding:8px 12px;font-weight:800;white-space:nowrap}.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:12px}.stat{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:15px}.stat b{display:block;font-size:24px;letter-spacing:-.03em}.stat span{color:var(--muted);font-size:12px}.controls{display:grid;grid-template-columns:minmax(220px,1fr) auto auto;gap:10px;background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:10px;margin-bottom:10px}.controls input,.controls select,.reset{border:1px solid var(--line);background:#fff;color:var(--ink);border-radius:9px;padding:10px 12px;outline:none}.controls input:focus,.controls select:focus{border-color:var(--blue);box-shadow:0 0 0 3px #2563eb18}.reset{cursor:pointer}.filters{display:flex;gap:7px;overflow:auto;padding:0 0 12px;scrollbar-width:thin}.filter{border:1px solid var(--line);background:#fff;border-radius:999px;padding:7px 11px;white-space:nowrap;cursor:pointer}.filter.active{background:var(--ink);color:#fff;border-color:var(--ink)}.workspace{display:grid;grid-template-columns:minmax(360px,.88fr) minmax(460px,1.12fr);gap:12px;align-items:start}.list,.detail{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius)}.list-head{display:flex;justify-content:space-between;padding:12px 14px;border-bottom:1px solid var(--line);color:var(--muted);font-size:12px}.papers{max-height:calc(100vh - 290px);overflow:auto}.paper{width:100%;display:grid;grid-template-columns:42px 1fr auto;gap:10px;text-align:left;padding:13px 14px;border:0;border-bottom:1px solid var(--line);background:#fff;color:inherit;cursor:pointer}.paper:hover{background:#fafaf8}.paper.active{background:#f1f5ff;box-shadow:inset 3px 0 var(--blue)}.rank{font:800 17px ui-monospace,monospace}.paper-title{font-weight:750;line-height:1.35}.paper-product{color:var(--muted);font-size:12px;margin-top:4px}.score{font:800 14px ui-monospace,monospace;color:var(--blue)}.detail{position:sticky;top:12px;min-height:500px;padding:22px}.detail h2{font-size:27px;line-height:1.14;letter-spacing:-.03em;margin:5px 0}.paper-name{color:var(--muted);margin:0 0 17px}.one-liner{font-size:16px;border-left:4px solid var(--lime);padding:9px 12px;background:#fbfce9}.score-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:7px;margin:15px 0}.score-card{background:var(--soft);border-radius:9px;padding:9px}.score-card b{display:block;font:800 17px ui-monospace,monospace}.score-card span{font-size:11px;color:var(--muted)}.section{padding:14px 0;border-top:1px solid var(--line)}.section h3{font-size:11px;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);margin:0 0 7px}.section p{margin:0}.chips{display:flex;flex-wrap:wrap;gap:6px}.chip{background:var(--soft);border-radius:999px;padding:5px 9px}.two{display:grid;grid-template-columns:1fr 1fr;gap:16px}.hypothesis{background:#fffae8;border:1px solid #eee0a4;border-radius:10px;padding:12px}.links{display:flex;flex-wrap:wrap;gap:7px;margin-top:14px}.links a{color:var(--blue);text-decoration:none;border:1px solid #bdcffb;border-radius:8px;padding:7px 10px}.empty{padding:40px;text-align:center;color:var(--muted)}ol.clean{margin:0;padding-left:20px}.muted{color:var(--muted)}
    @media(max-width:900px){.shell{padding:16px}.workspace{grid-template-columns:1fr}.papers{max-height:none}.detail{position:static}.top{align-items:flex-start;flex-direction:column}.stats{grid-template-columns:1fr 1fr}.controls{grid-template-columns:1fr 1fr}.controls input{grid-column:1/-1}}@media(max-width:520px){.shell{padding:10px}.two,.score-grid{grid-template-columns:1fr 1fr}.detail{padding:16px}.paper{grid-template-columns:34px 1fr}.score{display:none}}
  </style>
</head>
<body>
<main class="shell">
  <header class="top"><div><div class="eyebrow">Founder opportunity terminal</div><h1>Paper Finder / Top 21</h1><div class="sub" id="report-line"></div></div><div class="badge">真实论文 · 无占位</div></header>
  <section class="stats" id="stats"></section>
  <section class="controls"><input id="search-input" type="search" placeholder="搜索论文、产品、客户或痛点…"><select id="sort-select" aria-label="排序"><option value="rank">按综合排名</option><option value="total">按总分</option><option value="commercial">按商业潜力</option><option value="solo">按单人可行性</option><option value="mvp">按 MVP 速度</option></select><button class="reset" id="reset-button">重置</button></section>
  <nav class="filters" id="category-filters" aria-label="论文分类"></nav>
  <section class="workspace"><div class="list"><div class="list-head"><span>机会清单</span><span id="result-count"></span></div><div class="papers" id="paper-list"></div><div class="empty" id="empty-state" hidden>没有匹配结果，换个关键词试试。</div></div><article class="detail" id="paper-detail"></article></section>
</main>
<script id="dashboard-data" type="application/json">__DASHBOARD_DATA__</script>
<script id="report-meta" type="application/json">__REPORT_META__</script>
<script>
(()=>{'use strict';const papers=JSON.parse(document.getElementById('dashboard-data').textContent),meta=JSON.parse(document.getElementById('report-meta').textContent);const $=id=>document.getElementById(id),state={query:'',category:'all',sort:'rank',selectedRank:1};const list=$('paper-list'),detail=$('paper-detail'),empty=$('empty-state');const escList=v=>Array.isArray(v)?v:String(v||'').split(/;|；|\n/).map(x=>x.trim()).filter(Boolean);const label=v=>String(v||'未分类').replaceAll('_',' / ');const number=v=>Number(v||0);const node=(tag,cls,text)=>{const e=document.createElement(tag);if(cls)e.className=cls;if(text!==undefined)e.textContent=text;return e};
function stats(){const items=[[meta.candidate_count,'真实候选池'],[meta.selected_count,'最终 Top 21'],[meta.top_score,'最高总分'],[meta.category_count,'研究分类']];$('stats').replaceChildren(...items.map(([v,l])=>{const e=node('div','stat');e.append(node('b','',v),node('span','',l));return e}));$('report-line').textContent=`报告日期 ${meta.report_date||'—'} · 30+ 候选统一评分后取前 21`}
function filters(){const cats=['all',...new Set(papers.map(p=>p.category))];$('category-filters').replaceChildren(...cats.map(c=>{const b=node('button','filter'+(state.category===c?' active':''),c==='all'?'全部':label(c));b.type='button';b.onclick=()=>{state.category=c;filters();render()};return b}))}
function matches(p){const hay=[p.title,p.product_name,p.one_liner,p.pain_point,...escList(p.target_customers)].join(' ').toLowerCase();return(state.category==='all'||p.category===state.category)&&hay.includes(state.query.toLowerCase())}
function visible(){const rows=papers.filter(matches);const keys={rank:'rank',total:'total_score',commercial:'commercial_potential_score',solo:'solo_founder_feasibility_score',mvp:'mvp_speed_score'},key=keys[state.sort];return rows.sort((a,b)=>state.sort==='rank'?number(a[key])-number(b[key]):number(b[key])-number(a[key]))}
function render(){const rows=visible();$('result-count').textContent=`${rows.length} / 21`;empty.hidden=rows.length>0;list.hidden=!rows.length;if(rows.length&&!rows.some(p=>number(p.rank)===state.selectedRank))state.selectedRank=number(rows[0].rank);list.replaceChildren(...rows.map(p=>{const b=node('button','paper'+(number(p.rank)===state.selectedRank?' active':''));b.type='button';b.append(node('div','rank',`#${p.rank}`));const copy=node('div');copy.append(node('div','paper-title',p.title),node('div','paper-product',p.product_name));b.append(copy,node('div','score',p.total_score));b.onclick=()=>{state.selectedRank=number(p.rank);render()};return b}));renderDetail(rows.find(p=>number(p.rank)===state.selectedRank))}
function section(title,content,cls=''){const s=node('section','section '+cls);s.append(node('h3','',title),content);return s}function chips(values){const e=node('div','chips');escList(values).forEach(v=>e.append(node('span','chip',v)));return e}function ordered(values){const e=node('ol','clean');escList(values).forEach(v=>e.append(node('li','',v)));return e}
function renderDetail(p){detail.replaceChildren();if(!p){detail.append(node('div','empty','请选择一个项目'));return}detail.append(node('div','eyebrow',`Rank ${p.rank} · ${label(p.category)}`),node('h2','',p.product_name),node('p','paper-name',p.title),node('p','one-liner',p.one_liner));const scores=node('div','score-grid');[['总分',p.total_score],['商业',p.commercial_potential_score],['单人',p.solo_founder_feasibility_score],['MVP',p.mvp_speed_score]].forEach(([l,v])=>{const c=node('div','score-card');c.append(node('b','',v),node('span','',l));scores.append(c)});detail.append(scores,section('目标客户',chips(p.target_customers)),section('客户痛点',node('p','',p.pain_point)),section('产品雏形 / MVP',node('p','',p.mvp)));const pricing=node('div','hypothesis');pricing.append(node('strong','','定价假设（需访谈验证）'),node('p','',`${p.pricing_unit} · 试点 ${p.pilot_price} · 常态 ${p.steady_state_pricing}`));detail.append(section('盈利模式',pricing));const two=node('div','two');two.append(section('获客切口',ordered(p.acquisition)),section('30 天验证',ordered(p.validation_30d)));detail.append(two,section('主要风险',ordered(p.risks)));const links=node('div','links');[['论文',p.url],['PDF',p.pdf_url],['代码',p.code_url],['模型',p.huggingface_url]].forEach(([name,url])=>{try{const u=new URL(url);if(!['http:','https:'].includes(u.protocol))return;const a=node('a','',name+' ↗');a.href=u.href;a.target='_blank';a.rel='noopener noreferrer';links.append(a)}catch{}});detail.append(links)}
$('search-input').addEventListener('input',e=>{state.query=e.target.value.trim();render()});$('sort-select').addEventListener('change',e=>{state.sort=e.target.value;render()});$('reset-button').onclick=()=>{state.query='';state.category='all';state.sort='rank';$('search-input').value='';$('sort-select').value='rank';filters();render()};stats();filters();render()})();
</script>
</body>
</html>
