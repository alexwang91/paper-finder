function section(title,content,cls=''){const s=node('section','section '+cls);s.append(node('h3','',title),content);return s}function chips(values){const e=node('div','chips');escList(values).forEach(v=>e.append(node('span','chip',v)));return e}function ordered(values){const e=node('ol','clean');escList(values).forEach(v=>e.append(node('li','',v)));return e}
function renderDetail(p){detail.replaceChildren();if(!p){detail.append(node('div','empty','请选择一个项目'));return}detail.append(node('div','eyebrow',`排名 ${p.rank} · ${label(p.category)}`),node('p','paper-name',p.title),section('论文结论',node('p','one-liner',p.research_takeaway)),node('h2','',p.product_name),node('p','one-liner',p.one_liner));const scores=node('div','score-grid');[['总分',p.total_score],['商业潜力',p.commercial_potential_score],['单人可行性',p.solo_founder_feasibility_score],['MVP 速度',p.mvp_speed_score]].forEach(([l,v])=>{const c=node('div','score-card');c.append(node('b','',v),node('span','',l));scores.append(c)});detail.append(scores,section('目标客户',chips(p.target_customers)),section('客户痛点',node('p','',p.pain_point)),section('产品雏形 / MVP',node('p','',p.mvp)));const pricing=node('div','hypothesis');pricing.append(node('strong','','定价假设（需访谈验证）'),node('p','',`${p.pricing_unit} · 试点 ${p.pilot_price} · 常态 ${p.steady_state_pricing}`));detail.append(section('盈利模式',pricing));const two=node('div','two');two.append(section('获客切口',ordered(p.acquisition)),section('30 天验证',ordered(p.validation_30d)));detail.append(two,section('主要风险',ordered(p.risks)));const links=node('div','links');[['论文',p.url],['PDF',p.pdf_url],['代码',p.code_url],['模型',p.huggingface_url]].forEach(([name,url])=>{try{const u=new URL(url);if(!['http:','https:'].includes(u.protocol))return;const a=node('a','',name+' ↗');a.href=u.href;a.target='_blank';a.rel='noopener noreferrer';links.append(a)}catch{}});detail.append(links)}
$('search-input').addEventListener('input',e=>{state.query=e.target.value.trim();render()});$('sort-select').addEventListener('change',e=>{state.sort=e.target.value;render()});$('reset-button').onclick=()=>{state.query='';state.category='all';state.sort='rank';$('search-input').value='';$('sort-select').value='rank';filters();render()};stats();filters();render()})();
